name: Deploy Web UI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: |
          bun install
          cp node_modules/gifsicle-wasm/dist/gifsicle.js web/lib/gifsicle/gifsicle.js
          cp node_modules/gifsicle-wasm/dist/gifsicle.wasm web/lib/gifsicle/gifsicle.wasm

      - name: Build web bundle
        run: bash scripts/build_web.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
